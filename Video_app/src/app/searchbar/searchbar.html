<section>
  <form [formGroup]="searchForm" (ngSubmit)="onSearch()">
    <input 
      class="search"
      formControlName="videoUrl"
      placeholder="Type the Youtube URL"
      type="text" />
    <button 
      class="searchButton" 
      type="submit"
      [disabled]="searchForm.invalid"> <!-- evita que el botón se pueda usar si el URL no funsiona o no es correcto-->
      <app-icons icon="search" color="white" width="24"></app-icons>
    </button>
  </form>
</section>
