<div class="bookmark-container">
  <h3>BOOKMARKED VIDEOS</h3>
  <ul>
    @for (item of bookmarkList; track item.url) {
      <li class="bookmark-row">
        
        <button type="button" class="bookmark-link" (click)="selectedUrl.emit(item.url)">
          {{ item.url }}
        </button>

        <div class="action-buttons">
          <button type="button" class="btn-info" (click)="openPopUp(item)">ADD</button>
          <button type="button" class="btn-delete" (click)="onDeleteBookmark.emit(item.url)">DELETE</button>
        </div>

      </li>
    } @empty {
      <p class="empty-msg">NO SAVED URLS</p>
    }
  </ul>
</div>

@if (isPopUpOpen && selectedItem) {
  <div class="modal-overlay" (click)="closePopUp()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h4>DETAILS</h4>
        <button type="button" class="close-x" (click)="closePopUp()">&times;</button>
      </div>
      <div class="modal-body">
        <p><strong>URL:</strong></p>
        <a [href]="selectedItem.url" target="_blank" class="modal-url">{{ selectedItem.url }}</a>
        
        <p><strong>DATE ADDED:</strong></p>
        <span class="modal-date">📅 {{ selectedItem.bookmarkedAt }}</span>
      </div>
    </div>
  </div>
}
