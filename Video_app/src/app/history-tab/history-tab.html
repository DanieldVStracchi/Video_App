@if (historyList.length > 0 ){
    <div class="history-container">
        <h3>YOUTUBE VIDEOS HISTORY</h3>
        <ul>
            @for (url of historyList; track url) {
                <li>
                    <button type="button" class="hisotry-link" (click)=" selectUrl(url)"></button>
                </li>

            }
        </ul>


    </div>

}
